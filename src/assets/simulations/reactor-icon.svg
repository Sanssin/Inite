<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coreGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0066ff" stop-opacity="0.2" />
      <stop offset="50%" stop-color="#00ffff" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0066ff" stop-opacity="0.2" />
    </linearGradient>
  </defs>

  <!-- Reactor Vessel -->
  <path d="M 30 180 Q 100 210 170 180 L 170 40 Q 100 10 30 40 Z" fill="#1a1a2e" stroke="#4a4e69" stroke-width="4" />
  
  <!-- Coolant / Core Glow -->
  <path d="M 40 170 Q 100 190 160 170 L 160 50 Q 100 30 40 50 Z" fill="url(#coreGlow)" />
  
  <!-- Control Rods (Raised and Lowered) -->
  <rect x="60" y="20" width="10" height="120" fill="#a0a0a0" rx="3" />
  <rect x="95" y="60" width="10" height="100" fill="#a0a0a0" rx="3" />
  <rect x="130" y="10" width="10" height="150" fill="#a0a0a0" rx="3" />
  
  <!-- Fuel Rods -->
  <rect x="75" y="70" width="8" height="90" fill="#ffaa00" rx="2" />
  <rect x="115" y="70" width="8" height="90" fill="#ffaa00" rx="2" />
  
  <!-- Neutrons / Energy -->
  <circle cx="80" cy="110" r="3" fill="#ffffff" />
  <circle cx="110" cy="140" r="3" fill="#ffffff" />
  <circle cx="100" cy="90" r="3" fill="#ffffff" />
  
  <!-- Cherenkov Radiation lines -->
  <path d="M 50 160 L 50 60" stroke="#00ffff" stroke-width="2" opacity="0.5" />
  <path d="M 150 160 L 150 60" stroke="#00ffff" stroke-width="2" opacity="0.5" />
</svg>