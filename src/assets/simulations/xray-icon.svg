<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="url(#bgGrad)"/>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c2833" />
      <stop offset="100%" stop-color="#0a0f14" />
    </linearGradient>
  </defs>
  
  <!-- Outer Housing (Shielding) -->
  <path d="M 10 40 L 90 40 L 90 60 L 65 60 L 65 75 L 45 75 L 45 60 L 10 60 Z" fill="none" stroke="#555" stroke-width="2"/>
  
  <!-- Glass envelope (Vacuum tube) -->
  <path d="M 20 46 L 40 46 C 45 46, 50 35, 65 35 L 80 35 L 80 65 L 65 65 C 50 65, 45 54, 40 54 L 20 54 Z" fill="none" stroke="#aab7b8" stroke-width="2"/>
  
  <!-- Cathode Assembly (Focusing Cup & Filament) -->
  <rect x="15" y="48" width="10" height="4" fill="#7f8c8d"/>
  <path d="M 25 47 L 30 47 C 33 47, 33 53, 30 53 L 25 53 Z" fill="#95a5a6"/>
  <circle cx="28" cy="50" r="2" fill="#e74c3c" />
  
  <!-- Anode Assembly (Angled Target) -->
  <polygon points="65,40 70,40 70,60 65,60 55,50" fill="#f39c12"/>
  <rect x="70" y="46" width="15" height="8" fill="#e67e22"/>
  
  <!-- High Voltage Wires -->
  <line x1="0" y1="50" x2="15" y2="50" stroke="#3498db" stroke-width="2"/>
  <line x1="85" y1="50" x2="100" y2="50" stroke="#e74c3c" stroke-width="2"/>
  
  <!-- Electron Beam -->
  <line x1="33" y1="50" x2="52" y2="50" stroke="#00ffff" stroke-width="1" stroke-dasharray="2,2"/>
  
  <!-- X-Ray Beams -->
  <path d="M 58 53 L 48 78" stroke="#f1c40f" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M 60 55 L 56 80" stroke="#f1c40f" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M 62 57 L 64 78" stroke="#f1c40f" stroke-width="1.5" stroke-dasharray="4,2"/>
</svg>
